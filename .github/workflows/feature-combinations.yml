name: Feature Combinations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-check:
    name: Cargo check feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build KosherJava reference jar
        working-directory: crates/zmanim-calculator/java
        run: mvn --batch-mode "-Dmaven.javadoc.skip=true" package

      - name: Run cargo check feature matrix
        run: bash .github/scripts/cargo-feature-combinations.sh
