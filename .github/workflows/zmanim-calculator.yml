name: Zmanim Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: no_std
            args: "--no-default-features"
          - name: no_std+defmt
            args: "--no-default-features --features defmt"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy -p zmanim-calculator ${{ matrix.args }} -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Check documentation
        run: cargo doc -p zmanim-calculator --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings

  check:
    name: Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: no_std
            args: "--no-default-features"
          - name: no_std+defmt
            args: "--no-default-features --features defmt"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p zmanim-calculator ${{ matrix.args }}

  java-bindings:
    name: Java Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build KosherJava reference jar
        working-directory: crates/zmanim-calculator/java
        run: mvn --batch-mode package
      - name: Install jbindgen
        run: cargo install jbindgen
      - name: Regenerate Java bindings
        working-directory: crates/zmanim-calculator
        run: jbindgen java ./java/src/main/ -o ./src/java_bindings.rs --root crate::java_bindings
      - name: Verify generated Java bindings are committed
        run: git diff --exit-code -- crates/zmanim-calculator/src/java_bindings.rs

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: noaa-refraction
            args: ""
          - name: spa-refraction
            args: "--features __test-spa-refraction"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build KosherJava reference jar
        working-directory: crates/zmanim-calculator/java
        run: mvn --batch-mode package
      - name: Run tests
        run: cargo test -p zmanim-calculator --verbose --no-default-features ${{ matrix.args }}
